# NAMD minimization — dome + grafted M3, water only, no membrane
# Dome restrained (B=10 per Dr. Haddadian); M3 free (B=0)

set OUTDIR /scratch/midway3/junseo/26summer-research/minimize_m3

structure      $OUTDIR/dome_m3_ionized.psf
coordinates    $OUTDIR/dome_m3_ionized.pdb

set TOPPAR /scratch/midway3/junseo/26summer-research/charmm-gui-9cz2fulldome-8119908655/namd/toppar
paraTypeCharmm  on
parameters      $TOPPAR/par_all36m_prot.prm
parameters      $TOPPAR/par_all36_na.prm
parameters      $TOPPAR/par_all36_carb.prm
parameters      $TOPPAR/par_all36_lipid.prm
parameters      $TOPPAR/par_all36_cgenff.prm
parameters      $TOPPAR/par_interface.prm
parameters      $TOPPAR/toppar_all36_moreions.str
parameters      $TOPPAR/toppar_all36_nano_lig.str
parameters      $TOPPAR/toppar_all36_nano_lig_patch.str
parameters      $TOPPAR/toppar_all36_synthetic_polymer.str
parameters      $TOPPAR/toppar_all36_synthetic_polymer_patch.str
parameters      $TOPPAR/toppar_all36_polymer_solvent.str
parameters      $TOPPAR/toppar_water_ions.str
parameters      $TOPPAR/toppar_dum_noble_gases.str
parameters      $TOPPAR/toppar_ions_won.str
parameters      $TOPPAR/cam.str
parameters      $TOPPAR/toppar_all36_prot_arg0.str
parameters      $TOPPAR/toppar_all36_prot_c36m_d_aminoacids.str
parameters      $TOPPAR/toppar_all36_prot_fluoro_alkanes.str
parameters      $TOPPAR/toppar_all36_prot_heme.str
parameters      $TOPPAR/toppar_all36_prot_na_combined.str
parameters      $TOPPAR/toppar_all36_prot_retinol.str
parameters      $TOPPAR/toppar_all36_prot_model.str
parameters      $TOPPAR/toppar_all36_prot_modify_res.str
parameters      $TOPPAR/toppar_all36_na_nad_ppi.str
parameters      $TOPPAR/toppar_all36_na_rna_modified.str
parameters      $TOPPAR/toppar_all36_lipid_sphingo.str
parameters      $TOPPAR/toppar_all36_lipid_archaeal.str
parameters      $TOPPAR/toppar_all36_lipid_bacterial.str
parameters      $TOPPAR/toppar_all36_lipid_cardiolipin.str
parameters      $TOPPAR/toppar_all36_lipid_cholesterol.str
parameters      $TOPPAR/toppar_all36_lipid_dag.str
parameters      $TOPPAR/toppar_all36_lipid_inositol.str
parameters      $TOPPAR/toppar_all36_lipid_lnp.str
parameters      $TOPPAR/toppar_all36_lipid_lps.str
parameters      $TOPPAR/toppar_all36_lipid_mycobacterial.str
parameters      $TOPPAR/toppar_all36_lipid_miscellaneous.str
parameters      $TOPPAR/toppar_all36_lipid_model.str
parameters      $TOPPAR/toppar_all36_lipid_prot.str
parameters      $TOPPAR/toppar_all36_lipid_tag.str
parameters      $TOPPAR/toppar_all36_lipid_yeast.str
parameters      $TOPPAR/toppar_all36_lipid_hmmm.str
parameters      $TOPPAR/toppar_all36_lipid_detergent.str
parameters      $TOPPAR/toppar_all36_lipid_ether.str
parameters      $TOPPAR/toppar_all36_lipid_oxidized.str
parameters      $TOPPAR/toppar_all36_carb_glycolipid.str
parameters      $TOPPAR/toppar_all36_carb_glycopeptide.str
parameters      $TOPPAR/toppar_all36_carb_imlab.str
parameters      $TOPPAR/toppar_all36_label_spin.str
parameters      $TOPPAR/toppar_all36_label_fluorophore.str

# Output
outputName      $OUTDIR/dome_m3_minimized_v3
binaryOutput    no
restartfreq     500
dcdfreq         100
XSTFreq         100
outputEnergies  40
OutputTiming    0

# Timestep (irrelevant for minimization but required)
timestep        1.0

# Temperature (set low for pure minimization)
temperature     0

# Periodic boundary — from CRYST1 record of solvated PDB
cellBasisVector1  284.516   0.000   0.000
cellBasisVector2    0.000 272.457   0.000
cellBasisVector3    0.000   0.000 197.517
cellOrigin          0.000   0.000   0.000

# Nonbonded
exclude         scaled1-4
1-4scaling      1.0
switching       on
vdwForceSwitching on
cutoff          12.0
switchdist      10.0
pairlistdist    16.0
stepspercycle   8
nonbondedFreq   2
fullElectFrequency 4

# PME
PME             yes
PMEGridSpacing  1.0

# Restraints — B-factor column drives the harmonic force constant (kcal/mol/A^2)
constraints     on
consref         $OUTDIR/restraints.pdb
conskfile       $OUTDIR/restraints.pdb
conskcol        B
constraintScaling 1.0

# Minimization only
minimization    on
numsteps        10000

# Wrap
wrapAll         on
