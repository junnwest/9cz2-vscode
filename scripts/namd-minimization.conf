# NAMD minimization config — resolve clashes after chain V rotation
# Source: full_dome/9cz2-mini.conf (Rajiv, May 2026)
# Purpose: resolve steric clashes at chain V / chain A interface
# Restraint: chain V res 1-266 + chain A res 266-292 free (B=0); everything else B=500

minimization            on
timestep                1
numsteps                10000
stepspercycle           8

coordinates             9cz2-solvated-ionized.pdb
structure               9cz2-solvated-ionized.psf
outputname              9cz2-mini
restartfreq             500
dcdfreq                 100
XSTFreq                 100
outputEnergies          40

paraTypeCharmm          on
parameters              toppar/par_all36m_prot.prm
parameters              toppar/par_all36_na.prm
parameters              toppar/par_all36_carb.prm
parameters              toppar/par_all36_lipid.prm
parameters              toppar/par_all36_cgenff.prm
parameters              toppar/par_interface.prm
parameters              toppar/toppar_all36_moreions.str
parameters              toppar/toppar_water_ions.str
parameters              toppar/cam.str
# (full toppar list in original file)

Constraints             on
constraintScaling       1.0
Consref                 9cz2-restrain.pdb
ConsKFile               9cz2-restrain.pdb
ConsKCol                B

exclude                 scaled1-4
1-4scaling              1
switching               on
cutoff                  12
switchdist              10
pairlistdist            13.5
nonBondedFreq           2
fullElectFrequency      4

wrapAll                 on

cellBasisVector1        287.200    0.00    0.00
cellBasisVector2          0.00  299.530    0.00
cellBasisVector3          0.00    0.00  220.230
cellOrigin                0.44    0.05   -0.05

PME                     yes
PMEGridSpacing          1.0
